<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>クーポン管理</title>

<style>
*{
  box-sizing:border-box;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  max-width:430px;
  margin:auto;
  padding:10px;
  background:#f8f8f8;
  font-size:14px;
}

h1{
  font-size:22px;
  text-align:center;
  margin:8px 0 12px;
}

.row{
  display:flex;
  gap:6px;
  margin-bottom:6px;
}

input,textarea,button{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
}

textarea{
  height:60px;
  resize:none;
}

button{
  background:#007aff;
  color:white;
  border:none;
  font-weight:bold;
}

.card{
  background:white;
  border-radius:12px;
  padding:10px;
  margin:8px 0;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}

.card img{
  width:100%;
  max-height:130px;
  object-fit:contain;
  margin-top:8px;
  border-radius:10px;
}

.expired{
  background:#ffe3e3;
}

.used{
  opacity:.55;
}

.small{
  font-size:12px;
  color:#666;
  margin-top:4px;
}

#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  z-index:9999;
  padding:10px;
}

#modal img{
  max-width:100%;
  max-height:100%;
  display:block;
  margin:auto;
}
</style>
</head>

<body>

<h1>クーポン管理</h1>

<div id="modal" onclick="this.style.display='none'">
<img id="modalImg">
</div>

<div class="row">
  <input id="name" placeholder="クーポン名">
</div>

<div class="row">
  <input id="store" placeholder="店舗名">
</div>

<div class="row">
  <input id="date" type="date">
</div>

<div class="row">
  <input id="search" placeholder="検索" oninput="render()">
</div>

<textarea id="memo" placeholder="メモ"></textarea>

<div class="row">
  <input id="img" type="file" accept="image/*">
</div>

<div class="row">
  <button onclick="addCoupon()">追加</button>
</div>

<div id="list"></div>

<script>
let data=[];

try{
  data=JSON.parse(localStorage.getItem("coupons")||"[]");
}catch(e){
  data=[];
}

function save(){
  localStorage.setItem("coupons",JSON.stringify(data));
}

function gv(id){
  return document.getElementById(id).value;
}

function addCoupon(){
  const file=document.getElementById("img").files[0];

  const item={
    id:Date.now(),
    name:gv("name"),
    store:gv("store"),
    date:gv("date"),
    memo:gv("memo"),
    img:"",
    used:false
  };

  const done=()=>{
    data.push(item);
    save();
    clearForm();
    render();
  };

  if(file){
    const r=new FileReader();
    r.onload=()=>{
      item.img=r.result;
      done();
    };
    r.readAsDataURL(file);
  }else{
    done();
  }
}

function clearForm(){
  ["name","store","date","memo","img"].forEach(id=>{
    document.getElementById(id).value="";
  });
}

function toggle(id){
  const x=data.find(v=>v.id===id);
  if(x){
    x.used=!x.used;
    save();
    render();
  }
}

function del(id){
  data=data.filter(v=>v.id!==id);
  save();
  render();
}

function esc(s){
  return String(s).replace(/[&<>"]/g,m=>({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;"
  }[m]));
}

function render(){

  const q=gv("search").toLowerCase();
  const today=new Date().toISOString().slice(0,10);

  const list=document.getElementById("list");
  list.innerHTML="";

  data.sort((a,b)=>(a.date||"9999").localeCompare(b.date||"9999"));

  data.filter(x =>
    x.name.toLowerCase().includes(q) ||
    x.store.toLowerCase().includes(q) ||
    x.memo.toLowerCase().includes(q)
  ).forEach(x=>{

    const d=document.createElement("div");

    d.className="card "
      +(x.used?"used ":"")
      +((x.date && x.date<today)?"expired":"");

    d.innerHTML=`
      <b>${esc(x.name)}</b><br>
      <div class="small">${esc(x.store)} ${esc(x.date)}</div>
      <div style="margin-top:6px">${esc(x.memo)}</div>

      <div class="row" style="margin-top:8px">
        <button onclick="toggle(${x.id})">
          ${x.used?"未使用に戻す":"使用済み"}
        </button>
        <button onclick="del(${x.id})" style="background:#ff3b30">
          削除
        </button>
      </div>

      ${x.img ? `<img src="${x.img}" onclick="zoom('${x.img}')">` : ""}
    `;

    list.appendChild(d);
  });
}

function zoom(src){
  document.getElementById("modal").style.display="block";
  document.getElementById("modalImg").src=src;
}

render();
</script>

</body>
</html>

<div class="row"><input id="search" placeholder="検索" oninput="render()"></div>

  <option value="dateAsc">期限が近い順</option>
  <option value="dateDesc">期限が遠い順</option>

 localStorage.setItem("coupons",JSON.stringify(data));

function gv(id){
 return document.getElementById(id).value;

 const file=document.getElementById("img").files[0];

 const item={
   id:Date.now(),
   name:gv("name"),
   store:gv("store"),
   date:gv("date"),
   memo:gv("memo"),
   img:"",
   used:false
 };

 const done=()=>{
   data.push(item);

   clearForm();
   render();

 if(file){
   const r=new FileReader();
   r.onload=()=>{

 ["name","store","date","memo","img"].forEach(id=>{

 }

 save();
 render();

 return String(s).replace(/[&<>"]/g,m=>({
   "&":"&amp;",
   "<":"&lt;",
   ">":"&gt;",
   '"':"&quot;"
 }[m]));
}

function sortData(arr){

 const mode=gv("sort");

 if(mode==="dateAsc"){
   arr.sort((a,b)=>(a.date||"9999").localeCompare(b.date||"9999"));
 }

 if(mode==="dateDesc"){
   arr.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
 }

 if(mode==="name"){
   arr.sort((a,b)=>a.name.localeCompare(b.name,"ja"));
 }

 return arr;
}

 );

 });

}
