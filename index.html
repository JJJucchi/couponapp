<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>クーポン管理</title><style>body{font-family:sans-serif;max-width:800px;margin:auto;padding:16px}input,textarea,button{margin:4px;padding:8px} .card{border:1px solid #ccc;border-radius:10px;padding:10px;margin:8px 0}.expired{background:#ffd6d6}.used{opacity:.6}.row{display:flex;gap:8px;flex-wrap:wrap}img{max-width:180px;display:block;margin-top:8px}</style></head><body><h1>クーポン管理</h1><div id='modal' style='display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);padding:20px;z-index:9999' onclick="this.style.display='none'"><img id='modalImg' style='max-width:100%;max-height:100%;display:block;margin:auto'></div><div class='row'><input id='name' placeholder='クーポン名'><input id='store' placeholder='店舗名'><input id='date' type='date'><input id='search' placeholder='検索' oninput='render()'></div><textarea id='memo' placeholder='メモ'></textarea><div class='row'><input id='img' type='file' accept='image/*'><button onclick='addCoupon()'>追加</button></div><div id='list'></div><script>
let data=[];
try{data=JSON.parse(localStorage.getItem('coupons')||'[]'); if(!Array.isArray(data)) data=[];}catch(e){data=[];}
function normalize(x){return {id:x.id||Date.now()+Math.random(),name:x.name||'',date:x.date||'',memo:x.memo||'',store:x.store||'',img:x.img||'',used:!!x.used};}
data=data.map(normalize);
function save(){localStorage.setItem('coupons',JSON.stringify(data));}
function gv(id){return document.getElementById(id).value;}
function addCoupon(){const file=document.getElementById('img').files[0]; const item={id:Date.now(),name:gv('name'),date:gv('date'),memo:gv('memo'),store:gv('store'),img:'',used:false}; const done=()=>{data.push(normalize(item));save();clearForm();render();}; if(file){const r=new FileReader(); r.onload=()=>{item.img=r.result; done();}; r.readAsDataURL(file);} else done();}
function clearForm(){['name','store','date','memo','img'].forEach(id=>document.getElementById(id).value='');}
function toggle(id){const x=data.find(v=>v.id===id); if(x){x.used=!x.used;save();render();}}
function del(id){data=data.filter(v=>v.id!==id);save();render();}
function esc(s){return String(s).replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function render(){data=data.map(normalize); const q=(gv('search')||'').toLowerCase(); const today=new Date().toISOString().slice(0,10); const list=document.getElementById('list'); list.innerHTML=''; data.sort((a,b)=>(a.date||'9999-99-99').localeCompare(b.date||'9999-99-99')); data.filter(x=>x.name.toLowerCase().includes(q)||x.memo.toLowerCase().includes(q)||x.store.toLowerCase().includes(q)).forEach(x=>{const d=document.createElement('div'); d.className='card '+(x.used?'used ':'')+((x.date&&x.date<today)?'expired':''); d.innerHTML=`<div><b>${esc(x.name)}</b> [${esc(x.store)}] ${esc(x.date)}</div><div>${esc(x.memo)}</div><label><input type='checkbox' ${x.used?'checked':''}>使用済み</label> <button>削除</button>${x.img?`<img src='${x.img}' style='cursor:pointer;max-width:180px'>`:''}`; d.querySelector('input').onchange=()=>toggle(x.id); d.querySelector('button').onclick=()=>del(x.id); const im=d.querySelector('img'); if(im){im.onclick=(e)=>{e.stopPropagation();document.getElementById('modal').style.display='block';document.getElementById('modalImg').src=x.img;};} list.appendChild(d);});}
save();render();
</script></body></html>
